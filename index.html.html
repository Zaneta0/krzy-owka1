<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Krzyżówka - Powiat Kościański</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: #f8f9fa; margin: 0; padding: 20px; user-select: none;
        }

        .crossword-container {
            position: relative; width: 700px; height: 990px;
            background-image: url('krzyzowka.jpg.jpg'); 
            background-size: 100% 100%; background-repeat: no-repeat;
            background-color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .cell {
            position: absolute; width: 32px; height: 33px; text-align: center;
            font-size: 20px; font-weight: bold; text-transform: uppercase;
            border: 1px solid #999; background: rgba(255, 255, 255, 0.4);
            outline: none; padding: 0; line-height: 33px;
        }

        .cell.red { border: 2px solid #e74c3c; background: rgba(231, 76, 60, 0.05); }
        .cell.final-haslo { border: 2px solid #2c3e50; background: rgba(255, 255, 255, 0.8); }

        .cell.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .cell.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        .controls { margin-top: 25px; display: flex; gap: 10px; }
        
        button {
            padding: 15px 45px; font-size: 18px; cursor: pointer;
            background: #2c3e50; color: white; border: none;
            border-radius: 30px; font-weight: bold; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background: #34495e; transform: translateY(-2px); }

        #win-message {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 1000; border: 3px solid #2ecc71;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
    </style>
</head>
<body>

    <div class="crossword-container" id="grid">
        <input type="text" class="cell" style="top: 159px; left: 212px;" data-ans="P">
        <input type="text" class="cell" style="top: 159px; left: 253px;" data-ans="A">
        <input type="text" id="h1" class="cell red" style="top: 159px; left: 295px;" data-ans="R">
        <input type="text" class="cell" style="top: 159px; left: 338px;" data-ans="K">

        <input type="text" class="cell" style="top: 213px; left: 211px;" data-ans="P">
        <input type="text" class="cell" style="top: 213px; left: 253px;" data-ans="Ł">
        <input type="text" id="h2" class="cell red" style="top: 213px; left: 296px;" data-ans="Y">
        <input type="text" class="cell" style="top: 213px; left: 338px;" data-ans="W">
        <input type="text" class="cell" style="top: 213px; left: 380px;" data-ans="A">
        <input type="text" class="cell" style="top: 213px; left: 422px;" data-ans="L">
        <input type="text" class="cell" style="top: 213px; left: 465px;" data-ans="N">
        <input type="text" class="cell" style="top: 212px; left: 506px;" data-ans="I">
        <input type="text" class="cell" style="top: 213px; left: 549px;" data-ans="A">

        <input type="text" class="cell" style="top: 268px; left: 84px;" data-ans="Ł">
        <input type="text" class="cell" style="top: 267px; left: 126px;" data-ans="A">
        <input type="text" class="cell" style="top: 267px; left: 169px;" data-ans="Z">
        <input type="text" class="cell" style="top: 267px; left: 211px;" data-ans="I">
        <input type="text" class="cell" style="top: 268px; left: 254px;" data-ans="E">
        <input type="text" id="h3" class="cell red" style="top: 267px; left: 296px;" data-ans="N">
        <input type="text" class="cell" style="top: 267px; left: 338px;" data-ans="K">
        <input type="text" class="cell" style="top: 268px; left: 380px;" data-ans="I">

        <input type="text" class="cell" style="top: 321px; left: 211px;" data-ans="W">
        <input type="text" class="cell" style="top: 321px; left: 254px;" data-ans="I">
        <input type="text" id="h4" class="cell red" style="top: 321px; left: 295px;" data-ans="E">
        <input type="text" class="cell" style="top: 321px; left: 338px;" data-ans="Ż">
        <input type="text" class="cell" style="top: 321px; left: 380px;" data-ans="A">

        <input type="text" id="h5" class="cell red" style="top: 375px; left: 296px;" data-ans="K">
        <input type="text" class="cell" style="top: 375px; left: 337px;" data-ans="A">
        <input type="text" class="cell" style="top: 375px; left: 380px;" data-ans="J">
        <input type="text" class="cell" style="top: 375px; left: 423px;" data-ans="A">
        <input type="text" class="cell" style="top: 376px; left: 465px;" data-ans="K">

        <input type="text" id="target-h1" class="cell final-haslo" style="top: 648px; left: 84px;" data-ans="R" readonly>
        <input type="text" id="target-h2" class="cell final-haslo" style="top: 648px; left: 119px;" data-ans="Y" readonly>
        <input type="text" id="target-h3" class="cell final-haslo" style="top: 648px; left: 153px;" data-ans="N" readonly>
        <input type="text" id="target-h4" class="cell final-haslo" style="top: 648px; left: 188px;" data-ans="E" readonly>
        <input type="text" id="target-h5" class="cell final-haslo" style="top: 648px; left: 223px;" data-ans="K" readonly>
    </div>

    <div class="controls">
        <button onclick="check()">SPRAWDŹ MOJE HASŁA</button>
        <button onclick="location.reload()" style="background:#7f8c8d;">RESET</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="win-message">
        <h2 style="color: #27ae60;">🎉 BRAWO! 🎉</h2>
        <p>Wszystkie hasła są poprawne.</p>
        <button onclick="location.reload()">Zagraj jeszcze raz</button>
    </div>

    <script>
        let inputs = Array.from(document.querySelectorAll('.cell:not([readonly])'));

        inputs.sort((a, b) => {
            const topA = parseInt(a.style.top);
            const topB = parseInt(b.style.top);
            const leftA = parseInt(a.style.left);
            const leftB = parseInt(b.style.left);
            
            if (Math.abs(topA - topB) < 10) { 
                return leftA - leftB;
            }
            return topA - topB;
        });

        inputs.forEach((input, index) => {
            input.setAttribute('maxlength', '1');
            
            input.addEventListener('input', (e) => {
                const val = e.target.value.toUpperCase();
                e.target.value = val;
                e.target.classList.remove('correct', 'wrong');

                if (e.target.id && e.target.id.startsWith('h')) {
                    const target = document.getElementById('target-' + e.target.id);
                    if (target) target.value = val;
                }

                if (val && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function check() {
            const allCells = document.querySelectorAll('.cell');
            let allCorrect = true;

            allCells.forEach(cell => {
                const userVal = cell.value.toUpperCase();
                const correctVal = cell.getAttribute('data-ans').toUpperCase();
                
                if (userVal === correctVal) {
                    cell.classList.add('correct');
                    cell.classList.remove('wrong');
                } else {
                    cell.classList.add('wrong');
                    cell.classList.remove('correct');
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('win-message').style.display = 'block';
            }
        }
    </script>
</body>
</html>
